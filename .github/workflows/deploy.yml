# GitHub Actions CI/CD Workflow
# Location: .github/workflows/deploy.yml
# Triggers on push to main branch

name: CI/CD - Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

jobs:
  # Job 1: Build and Test
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: 🏗️ Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: ${{ secrets.DOCKER_USERNAME }}/kanban-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: 🏗️ Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: ${{ secrets.DOCKER_USERNAME }}/kanban-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: ✅ Build Success
        run: echo "✅ Docker images built successfully!"

  # Job 2: Push to Docker Hub
  push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: 🚀 Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/kanban-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/kanban-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: 🚀 Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/kanban-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/kanban-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: ✅ Push Success
        run: |
          echo "✅ Images pushed to Docker Hub:"
          echo "📦 ${{ secrets.DOCKER_USERNAME }}/kanban-backend:latest"
          echo "📦 ${{ secrets.DOCKER_USERNAME }}/kanban-frontend:latest"

  # Job 3: Deploy to Railway
  deploy:
    name: Deploy to Cloud
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🚂 Install Railway CLI
        run: npm install -g @railway/cli
      
      - name: 🚀 Deploy to Railway
        run: railway up --project f0bcd233-770f-4d13-8fb3-2368447742b1
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      
      - name: ✅ Deployment Success
        run: echo "✅ Application deployed successfully!"
      
      - name: 📝 Deployment Summary
        run: |
          echo "🎉 Deployment Complete!"
          echo "Backend: https://kanban-backend.railway.app"
          echo "Frontend: https://kanban-frontend.railway.app"

  # Job 4: Notify on Success/Failure
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [build, push, deploy]
    if: always()
    
    steps:
      - name: ✅ Success Notification
        if: ${{ needs.deploy.result == 'success' }}
        run: |
          echo "✅ CI/CD Pipeline Completed Successfully!"
          echo "🚀 Application is now live!"
      
      - name: ❌ Failure Notification
        if: ${{ needs.deploy.result == 'failure' }}
        run: |
          echo "❌ CI/CD Pipeline Failed!"
          echo "Check logs for details."